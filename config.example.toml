app = { name = "PersonalityCore" }
providersDir = "./models.d"

[http]
port = "8090"

[grpc]
port = "9095"
useTLS = false
certFile = ""
keyFile = ""

[database]
dsn = "host=postgres port=5432 user=dyson password=dyson dbname=personality_core sslmode=disable"

[auth]
target = ""
useTLS = false
tlsSkipVerify = false
allowDevIds = true
offline = false
offlineAccountId = "local-dev"

[solarNetwork]
baseUrl = "https://api.dyson.example"

# Solar Network gRPC commonly uses self-signed certs.
# When connecting to Solar auth over TLS, set:
# useTLS = true
# tlsSkipVerify = true

[[providers]]
id = "openai"
type = "openai"
apiKey = ""
baseUrl = ""
byAzure = false
apiVersion = ""
timeout = "90s"
maxCompletionTokens = 2048
temperature = 0.7
topP = 1.0

[personality]
maxHistoryMessages = 24
sseHeartbeat = "15s"

[agents]
dir = "./agents.d"

[[agents.items]]
id = "support"
name = "Support"
description = "General support assistant"
systemPromptFile = "./prompts/support.md"
model = "openai/gpt-4.1-mini"
abilities = ["memory", "mood", "relationship"]
enabled = true

[[agents.items]]
id = "support-bot"
name = "Support Bot"
description = "Bot agent connected to Solar chat"
systemPrompt = "You are a support bot for Solar Network chat."
model = "openai/gpt-4.1-mini"
abilities = ["chat"]
enabled = true

[agents.items.solar-network-integration]
accountName = "support-bot"
accessToken = ""
