app = { name = "PersonalityCore" }
providersDir = "./models.d"

[http]
port = "8090"

[grpc]
port = "9095"
useTLS = false
certFile = ""
keyFile = ""

[database]
dsn = "host=postgres port=5432 user=dyson password=dyson dbname=personality_core sslmode=disable"

[auth]
target = ""
useTLS = false
tlsSkipVerify = false
allowDevIds = true
offline = false
offlineAccountId = "local-dev"
autonomousSecret = ""

[solarNetwork]
baseUrl = "https://api.dyson.example"

# Solar Network gRPC commonly uses self-signed certs.
# When connecting to Solar auth over TLS, set:
# useTLS = true
# tlsSkipVerify = true

[[providers]]
id = "openai"
type = "openai"
apiKey = ""
baseUrl = ""
byAzure = false
apiVersion = ""
timeout = "90s"
maxCompletionTokens = 2048
temperature = 0.7
topP = 1.0

[personality]
maxHistoryMessages = 24
sseHeartbeat = "15s"
chatInboundDebounce = "5s"
visionModel = ""

[personality.surfing]
enabled = false
interval = "1h"
prompt = "Browse the feed and interact with interesting posts. Reply, react, or repost as you see fit."

# Perk tiers control access limits per user perk level (0-3).
# Unset fields = unrestricted. Only configure tiers that differ from default.
#
# [personality.perkTiers.0]
# maxHistoryMessages = 8         # shorter context window
# maxCompletionTokens = 1024     # global fallback cap
# allowVision = false            # block image analysis
# allowFileSummary = false       # block file summarization
# blockedSkills = ["surfing", "tasks"]
#
# [personality.perkTiers.1]
# maxHistoryMessages = 16
# blockedSkills = ["surfing"]
#
# Per-model overrides go under the model config:
# [[providers.models]]
# name = "gpt-4o"
# modalities = ["image"]
# [providers.models.perkOverrides.0]
# blocked = true                 # perk 0 can't use gpt-4o
# [providers.models.perkOverrides.1]
# maxCompletionTokens = 2048
#
# Per-agent overrides go under the agent config:
# [agents.items.perkOverrides.0]
# maxCompletionTokens = 512

[agents]
dir = "./agents.d"

[[agents.items]]
id = "support"
name = "Support"
description = "General support assistant"
systemPromptFile = "./prompts/support.md"
model = "openai/gpt-4.1-mini"
abilities = ["memory", "mood", "relationship"]
enabled = true

[[agents.items]]
id = "support-bot"
name = "Support Bot"
description = "Bot agent connected to Solar chat"
systemPrompt = "You are a support bot for Solar Network chat."
model = "openai/gpt-4.1-mini"
chatMaxCompletionTokens = 160
abilities = ["chat", "autonomous"]
enabled = true

[agents.items.solar-network-integration]
accountName = "support-bot"
accessToken = ""

[agents.items.autonomous]
wakeInterval = "10m"
wakePrompt = "Check whether any active or DM conversations need a proactive follow-up."
